<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tic Tac Toe</h1>
        
        <div class="mode-selection">
            <button id="pvpBtn" class="mode-btn active">Player vs Player</button>
            <button id="pvaiBtn" class="mode-btn">Player vs AI</button>
        </div>

        <div class="game-info">
            <div class="current-player">
                Current Player: <span id="currentPlayer">X</span>
            </div>
            <div class="game-status" id="gameStatus"></div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="game-controls">
            <button id="resetBtn" class="reset-btn">Reset Game</button>
        </div>

        <div class="score-board">
            <div class="score">
                <h3>Player X</h3>
                <p id="scoreX">0</p>
            </div>
            <div class="score">
                <h3>Draws</h3>
                <p id="scoreDraws">0</p>
            </div>
            <div class="score">
                <h3>Player O / AI</h3>
                <p id="scoreO">0</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
